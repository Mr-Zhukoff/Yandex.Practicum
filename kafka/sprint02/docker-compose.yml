version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.13
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - kafka-network

  kafka:
    image: confluentinc/cp-kafka:7.4.13
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - kafka-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9093",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - kafka-network

  app-processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-processor
    command: ["./processor"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKERS=kafka:9093
    networks:
      - kafka-network
    restart: on-failure
    volumes:
      - processor-data:/root/block-manager
      - processor-data:/root/censor-manager
      - processor-data:/root/message-filter

  app-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-consumer
    command: ["./consumer"]
    depends_on:
      - kafka
      - app-processor
    environment:
      - KAFKA_BROKERS=kafka:9093
    networks:
      - kafka-network
    restart: on-failure

  app-producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-producer
    command: ["./producer"]
    depends_on:
      - kafka
      - app-processor
    environment:
      - KAFKA_BROKERS=kafka:9093
    networks:
      - kafka-network
    profiles:
      - test
    restart: "no"

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  processor-data:

networks:
  kafka-network:
    driver: bridge
